services:
  - type: web
    name: telega-bot
    runtime: python3
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false  # Set this in Render dashboard
      - key: PORT
        fromService:
          type: web
          name: telega-bot
          property: port